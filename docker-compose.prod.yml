services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    restart: unless-stopped
    expose:
      - 8001
    env_file:
      - .env
    environment:
      NODE_ENV: prod
      PORT: 8001
      ALLOWED_CROSS_ORIGIN: ${ALLOWED_CROSS_ORIGIN}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    volumes:
      - /mnt/d/image_storage:/usr/src/app/temp/image_storage
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      replicas: 6
      resources:
        reservations:
          cpus: '0.2'
          memory: 512M
        limits:
          cpus: '1.5'
          memory: 1G

  redis-1:
    image: redis:alpine
    restart: unless-stopped
    command: ['redis-server', '--port', '6380']
  redis-2:
    image: redis:alpine
    restart: unless-stopped
    command: ['redis-server', '--port', '6381']
  redis-3:
    image: redis:alpine
    restart: unless-stopped
    command: ['redis-server', '--port', '6382']

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - '8001:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main
