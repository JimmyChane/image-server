include:
  - path: ./redis.compose.yml
  - path: ./nginx.compose.yml

services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - 8001
    env_file:
      - .env
    environment:
      NODE_ENV: prod
      PORT: 8001
      ALLOWED_CROSS_ORIGIN: ${ALLOWED_CROSS_ORIGIN}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    volumes:
      - /mnt/d/image_storage:/usr/src/app/temp/image_storage
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      replicas: 6
      resources:
        reservations:
          cpus: '0.2'
          memory: 512M
        limits:
          cpus: '1.5'
          memory:
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8001/health',
        ]
      start_period: 30s
      start_interval: 0.5s
      interval: 20s
      timeout: 5s
      retries: 5
