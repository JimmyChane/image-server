include:
  - path: ./redis.compose.yml
  - path: ./nginx.compose.yml

services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    restart: unless-stopped
    expose:
      - 8001
    env_file:
      - .env
    environment:
      NODE_ENV: prod
      PORT: 8001
      ALLOWED_CROSS_ORIGIN: ${ALLOWED_CROSS_ORIGIN}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    volumes:
      - /mnt/d/image_storage:/usr/src/app/temp/image_storage
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      replicas: 6
      resources:
        reservations:
          cpus: '0.2'
          memory: 512M
        limits:
          cpus: '1.5'
          memory: 1G
