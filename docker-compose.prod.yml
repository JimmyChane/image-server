services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3000'
    environment:
      NODE_ENV: prod
      PORT: ${PORT}
      ALLOWED_CROSS_ORIGIN: ${ALLOWED_CROSS_ORIGIN}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    volumes:
      - /mnt/d/image_storage:/usr/src/app/temp/image_storage
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      replicas: 3
      resources:
        reservations:
          cpus: '0.2'
          memory: 512M
        limits:
          cpus: '1.5'
          memory: 1G
  nginx:
    image: nginx:latest
    restart: always
    ports:
      - '3001:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main
