events { worker_connections 1024; }

http {
    upstream nestjs_servers {
        # Use "Least Connections" instead of the default Round Robin.
        # If one replica is busy processing a large image, Nginx will send 
        # new requests to other idle replicas that have fewer active tasks.
        least_conn;
        
        # Docker DNS will resolve 'main' to all running containers of that service
        server main:8001;
    }

    server {
        listen 80;

        # Disable access logs during performance tests
        access_log off; 

        # Only log critical errors
        error_log /var/log/nginx/error.log crit;

        # Use Docker's internal DNS (127.0.0.11) to dynamically discover container IPs.
        # 'valid=5s' forces Nginx to re-check for new/restarted replicas every 5 seconds.
        resolver 127.0.0.11 valid=5s;

        location / {
            proxy_pass http://nestjs_servers; 

            # 1. Security: Overwrite instead of Append to prevent IP Spoofing
            # proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            # 2. Standard Headers
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 3. Support for WebSockets / Long-running connections
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # 4. Reliability: Pass request to next container if one fails
            proxy_next_upstream error timeout http_502 http_503 http_504;
            
            # Optional: Timeout settings for slow requests
            proxy_read_timeout 90s;
        }
    }
}