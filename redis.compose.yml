services:
  redis-1:
    image: redis:alpine
    restart: unless-stopped
    command: ['redis-server', '--port', '6380']
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6380', 'ping']
      start_period: 30s
      start_interval: 0.5s
      interval: 20s
      timeout: 5s
      retries: 5

  redis-2:
    image: redis:alpine
    restart: unless-stopped
    command: ['redis-server', '--port', '6381']
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6381', 'ping']
      start_period: 30s
      start_interval: 0.5s
      interval: 20s
      timeout: 5s
      retries: 5

  redis-3:
