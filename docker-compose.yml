include:
  - path: ./redis.compose.yml
  - path: ./nginx.compose.yml

services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    expose:
      - 8001
    env_file:
      - .env
    environment:
      NODE_ENV: dev
      PORT: 8001
      ALLOWED_CROSS_ORIGIN: ${ALLOWED_CROSS_ORIGIN}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/dist
      - /mnt/d/image_storage:/usr/src/app/temp/image_storage
    develop:
      watch:
        - path: ./package.json
          action: rebuild
          target: /usr/src/app/package.json
        - path: ./package-lock.json
          action: rebuild
          target: /usr/src/app/package-lock.json
        - path: ./src
          action: sync
          target: /usr/src/app/src
    command: npm run start:dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8001/health']
      start_period: 30s
      start_interval: 0.5s
      interval: 20s
      timeout: 5s
      retries: 5
