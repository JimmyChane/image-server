services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    expose:
      - 8001
    env_file:
      - .env
    environment:
      NODE_ENV: dev
      PORT: 8001
      ALLOWED_CROSS_ORIGIN: ${ALLOWED_CROSS_ORIGIN}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/dist
      - /mnt/d/image_storage:/usr/src/app/temp/image_storage
    develop:
      watch:
        - path: ./package.json
          action: rebuild
          target: /usr/src/app/package.json
        - path: ./package-lock.json
          action: rebuild
          target: /usr/src/app/package-lock.json
        - path: ./src
          action: sync
          target: /usr/src/app/src
    command: npm run start:dev

  redis-1:
    container_name: redis-1
    image: redis:alpine
    ports:
      - '6379:6379'
  redis-2:
    container_name: redis-2
    image: redis:alpine
    ports:
      - '6380:6379'
  redis-3:
    container_name: redis-3
    image: redis:alpine
    ports:
      - '6381:6379'

  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - '8001:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main
