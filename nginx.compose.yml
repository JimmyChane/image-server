services:
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - '8001:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      main:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "curl -sI http://localhost | grep -q 'HTTP/1.1' || exit 1"]
      start_period: 30s
      start_interval: 0.5s
      interval: 20s
      timeout: 5s
      retries: 5
